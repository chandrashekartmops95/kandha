<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deeksha | Multidisciplinary Designer</title>
    <meta
      name="description"
      content="A cinematic portfolio for Deeksha, a multidisciplinary designer shaping brand, fashion, visual storytelling, and spatial experiences."
    />
    <link rel="icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (function (location) {
        if (location.search[1] !== "/") {
          return;
        }

        const decoded = location.search
          .slice(1)
          .split("&")
          .map((segment) => segment.replace(/~and~/g, "&"))
          .join("?");

        window.history.replaceState(null, "", location.pathname.slice(0, -1) + decoded + location.hash);
      })(window.location);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
  </html>
